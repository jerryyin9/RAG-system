version: '3.8'

services:
  # --- Milvus 向量数据库部分 ---
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: always
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: always
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
    volumes:
      - ./volumes/minio:/export
    command: minio server /export --console-address ":9001"

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.5
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio

  # --- Firecrawl 爬虫部分 ---
  firecrawl-redis:
    image: redis:alpine
    container_name: firecrawl-redis
    restart: always

  playwright:
    image: browserless/chrome:latest
    container_name: firecrawl-playwright
    restart: always
    environment:
      - MAX_CONCURRENT_SESSIONS=10

  firecrawl:
    image: mendable/firecrawl:latest
    container_name: firecrawl-service
    restart: always
    ports:
      - "13002:3002" # 这样你代码里访问 localhost:13002 就行了
    environment:
      - REDIS_URL=redis://firecrawl-redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright:3000
      - USE_DB_AUTHENTICATION=false
    depends_on:
      - firecrawl-redis
      - playwright

# 统一数据持久化卷
volumes:
  milvus_data: